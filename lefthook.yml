rc: ./lefthook.rc

pre-commit:
  piped: true
  jobs:
    - name: prettier
      glob: "*.{ts,tsx,mts,js,jsx,mjs,json,css,md,yml,yaml}"
      run: pnpm prettier --write {staged_files} && git add {staged_files}

    - name: typecheck
      root: "plugin/"
      run: pnpm tsc --noEmit

    - name: lint
      root: "plugin/"
      glob: "plugin/*.{ts,tsx,mts,js,jsx,mjs}"
      run: pnpm eslint --fix {staged_files} && git add {staged_files}
